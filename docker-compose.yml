services:
  discord-telegram-engagement-bot:
    build: .
    container_name: discord-telegram-engagement-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
    # Healthcheck: verify PID 1 is still the bot entrypoint without relying on procps/pgrep.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib, sys; cmdline = pathlib.Path('/proc/1/cmdline').read_text().replace('\\x00', ' '); sys.exit(0 if 'twitter_intel.main' in cmdline else 1)",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bot-data:
