services:
  discord-telegram-engagement-bot:
    build: .
    container_name: discord-telegram-engagement-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
    # Healthcheck: if the process dies, Docker restarts it
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import os; from pathlib import Path; db = Path(os.getenv(\"DB_PATH\", \"/app/data/bot_state.db\")); db = db if db.is_absolute() else Path(\"/app\") / db; raise SystemExit(0 if db.exists() else 1)'",
        ]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  bot-data:
