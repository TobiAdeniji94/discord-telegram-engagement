services:
  discord-telegram-engagement-bot:
    build: .
    container_name: discord-telegram-engagement-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
    # Healthcheck: verify the bot process is running
    healthcheck:
      test: ["CMD", "pgrep", "-f", "twitter_intel.main"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bot-data:
